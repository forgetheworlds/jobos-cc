#
# RATING SYSTEM:
#   "strong"     = You have extensive, documented experience and can lead with this
#   "moderate"   = You have solid experience but it's not your primary strength
#   "developing" = You have some experience but would need support in this area
#
# EVIDENCE FIELD:
#   Write 1-2 sentences describing a specific situation where you demonstrated
#   this skill. Include: what you did, where, and what the result was.
#   The system uses these as bullet points in tailored resumes.

skills_inventory:
