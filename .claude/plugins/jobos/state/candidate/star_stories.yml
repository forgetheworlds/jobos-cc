  - id: "community_partnership"
    theme: "External Partnership Development"
    situation: >
      York University needed stronger connections to community organizations
      to enhance student learning through practicum and experiential opportunities,
      particularly through the Pathways to Education partnership.
    task: >
      I was tasked with supervising first-year placement students and ensuring
      effective integration into community-based education initiatives through
