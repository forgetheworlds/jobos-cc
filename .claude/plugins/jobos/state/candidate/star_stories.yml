    action: >
      I supervised practicum placements, developed mentoring strategies to enhance
      students' teaching and classroom management skills, facilitated reflective
      practice sessions, and created feedback loops between community partners and
      the academic program.
    result: >
      Successfully supervised first-year placement students at the Pathways to
      Education–York University partnership (2010-2015), improving practicum
      students' instructional techniques through reflective practice and targeted
      mentoring strategies. Strengthened the community-university partnership for
      sustained collaborative programming.
    applicable_to: ["education_program_mgmt", "student_success", "stakeholder_engagement"]

