# STAR Stories — Dr. Mohamed Sambul
# Behavioral interview preparation using Situation-Task-Action-Result format.
# The Screening Question Writer and Cover Letter Crafter draw from these.

# Each story should be linked to specific resume_facts entries after /setup.
stories:
  - id: "leadership_program_redesign"
    theme: "Leadership / Initiative"
    situation: >
      The first-year student transition program was experiencing declining
      participation and retention rates were dropping after the first semester.
    task: >
      I was responsible for redesigning the program to improve student engagement
      and persistence into the second semester.
    action: >
      I conducted a comprehensive review of the existing program, gathered student
      feedback, benchmarked against peer institutions, and redesigned the transition
      experience to include extended orientation activities, peer mentoring
      connections, and structured mid-semester advisor check-ins.
    result: >
      Led program evaluation at Saudi Electronic University that resulted in an estimated
      15% improvement in course completion rates. Coordinated academic advising services
      that reduced student attrition in first-year courses. The redesigned program served
      2,000+ students annually with improved engagement and retention.
    applicable_to: ["student_success", "academic_admin", "leadership"]

  - id: "faculty_coordination"
    theme: "Collaboration / Stakeholder Management"
    situation: >
      As Program Manager of the First Common Year at Saudi Electronic University,
      I needed to align faculty across departments for consistent delivery of a
      first-year program serving 2,000+ students annually.
    task: >
      I was tasked with establishing a coordination structure that aligned faculty
      across departments while respecting departmental autonomy and maintaining
      teaching quality.
    action: >
      I designed faculty training sessions, created regular cross-department meetings,
      developed shared documentation for program expectations, and established clear
      communication channels between faculty and administration.
    result: >
      Faculty training sessions improved teaching quality and consistency across
      courses at Saudi Electronic University. The coordinated program served 2,000+
      students annually with aligned curriculum delivery and reduced variability
      in teaching outcomes.
    applicable_to: ["academic_admin", "curriculum_faculty_dev", "collaboration"]

  - id: "multicultural_student_support"
    theme: "Inclusive Practice / Student Support"
    situation: >
      At York University and Centennial College, diverse student populations
      needed culturally responsive teaching and support in courses on diaspora
      studies, developmental psychology, and education foundations.
    task: >
      I needed to develop inclusive learning experiences that addressed the needs
      of diverse and multicultural student populations, including refugee communities.
    action: >
      I integrated experiential learning activities into courses, served as Community
      Scholar at York University's Centre for Refugee Studies contributing research
      and training on refugee education, and developed culturally responsive teaching
      approaches for multicultural classrooms.
    result: >
      Increased student engagement through integrated experiential learning activities
      at York University and Centennial College. Contributed research and training on
      refugee education at the Centre for Refugee Studies, strengthening the institution's
      capacity to serve refugee and immigrant communities.
    applicable_to: ["student_success", "dei", "advising_support"]

